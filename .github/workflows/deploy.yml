name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ehsansalehi.ir
          # در صورت نیاز سایر متغیرهای محیطی که در زمان بیلد لازم هستند را اینجا اضافه کنید
          # مثل NEXT_PUBLIC_SUPABASE_URL و غیره
          
      - name: Prepare Standalone output for FTP
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          
      - name: Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: .next/standalone/

name: Deploy to Mizbanfa cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ehsansalehi.ir

      - name: Prepare Standalone output for FTP
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/tmp
          touch .next/standalone/tmp/restart.txt
          
      - name: Sync Files via FTP to Mizbanfa
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./ehsansalehi.ir/
          local-dir: .next/standalone/

      - name: Run News Migration from Hostinger DB
        run: |
          echo "Waiting 10 seconds for Passenger to restart..."
          sleep 10
          echo "Triggering migration..."
          curl -s -k -m 30 -X GET "https://ehsansalehi.ir/api/admin/migrate?pass=Ehsansalehi@123" || echo "Migration curl failed, might be geo-blocked"
